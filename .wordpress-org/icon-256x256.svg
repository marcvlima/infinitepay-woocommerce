<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f2e"/>
      <stop offset="100%" style="stop-color:#1a1a4e"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00c853"/>
      <stop offset="100%" style="stop-color:#00e676"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>

  <!-- Outer ring -->
  <circle cx="128" cy="128" r="100" fill="none" stroke="#00c853" stroke-width="1.5" opacity="0.2"/>

  <!-- Green arc top-right -->
  <path d="M 128 28 A 100 100 0 0 1 228 128" fill="none" stroke="url(#green)" stroke-width="4" stroke-linecap="round"/>

  <!-- IP monogram -->
  <text x="128" y="155" font-family="'Helvetica Neue', Arial, sans-serif" font-size="90" font-weight="800" fill="url(#green)" text-anchor="middle" dominant-baseline="auto">IP</text>

  <!-- Bottom label -->
  <text x="128" y="210" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="400" fill="#aaaacc" text-anchor="middle" letter-spacing="3">WOO</text>
</svg>
